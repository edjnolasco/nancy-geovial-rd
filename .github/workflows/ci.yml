name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas scikit-learn

      - name: Ruff check
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format . --check

      - name: Pytest
        run: pytest -v